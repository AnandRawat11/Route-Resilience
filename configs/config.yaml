# ============================================================
# Route Resilience — Phase 1 Configuration
# configs/config.yaml
# ============================================================

# ── Project ──────────────────────────────────────────────────
project:
  name: "Route Resilience"
  phase: 1
  version: "1.0.0"
  random_seed: 42

# ── Dataset Paths ─────────────────────────────────────────────
datasets:
  spacenet:
    enabled: false
    raw_dir: "data/raw/spacenet"
    image_subdir: "images"
    mask_subdir: "masks"
    image_extensions: [".tif", ".tiff", ".png"]
    mask_extensions: [".tif", ".tiff", ".png"]
    description: "SpaceNet Roads Dataset (not available in Phase 1)"

  deepglobe:
    enabled: true
    use_adapter: true            # Use DeepGlobeAdapter instead of generic scanner
    adapter: "deepglobe"
    raw_dir: "data/raw/deepglobe"   # symlink → DeepGlobe Road Extraction Dataset/
    description: "DeepGlobe Road Extraction Dataset (Kaggle)"
    # Phase 1: only tile the train split (valid/test have no masks)
    active_splits:
      - train

  opensatmap:
    enabled: false
    raw_dir: "data/raw/opensatmap"
    image_subdir: "images"
    mask_subdir: "masks"
    description: "OpenSatMap Dataset (not available in Phase 1)"

  osm:
    enabled: false
    raw_dir: "data/raw/osm"
    vector_subdir: "vectors"
    description: "OpenStreetMap (not available in Phase 1)"

  cartosat:
    enabled: false
    raw_dir: "data/raw/cartosat"
    image_subdir: "images"
    mask_subdir: "masks"
    description: "Cartosat-3 (future)"

# ── Processed Output Paths ─────────────────────────────────────
paths:
  # NOTE: data/processed/ is intentionally NOT used in Phase 1.
  # Standardization is done in-memory. No disk copies of raw images.
  processed_images: "data/processed/images"       # reserved for future use
  processed_masks: "data/processed/masks"         # reserved for future use
  processed_metadata: "data/processed/metadata"   # reserved for future use

  # Split-aware tile directories (Phase 1 outputs)
  tiles_root: "data/tiles"
  tiles_train_images: "data/tiles/train/images"
  tiles_train_masks: "data/tiles/train/masks"
  tiles_valid_images: "data/tiles/valid/images"   # populated in later phase
  tiles_test_images: "data/tiles/test/images"     # populated in later phase

  # Legacy flat paths (used by quality/visualization modules — kept for compat)
  tiles_images: "data/tiles/train/images"
  tiles_masks: "data/tiles/train/masks"

  reports: "outputs/reports"
  visualizations: "outputs/visualizations"
  occlusion_samples: "outputs/occlusion_samples"
  logs: "logs"

# ── Image Standardization ─────────────────────────────────────
standardization:
  target_channels: 3
  target_dtype: "uint8"
  percentile_low: 2
  percentile_high: 98
  resize_enabled: false
  max_dimension: 4096
  interpolation: "lanczos"
  # IMPORTANT: skip_save=true → in-memory only. No files written to data/processed/.
  skip_save: true
  normalize_float: false         # No _float32.npy files ever saved

# ── Tiling ───────────────────────────────────────────────────
tiling:
  tile_size: 512                    # pixels
  stride: 256                       # 50% overlap
  pad_mode: "reflect"
  pad_value: 0
  min_road_pixel_pct: 0.01          # discard tiles with < 0.01% road pixels
  min_image_std: 5.0                # discard near-blank tiles
  max_tiles_per_image: 6            # cap tile count per source image
  save_tile_info: true

  # Compression (saves ~40% storage vs PNG without quality loss for training)
  image_format: "jpg"               # JPEG for image tiles
  image_quality: 85                 # JPEG quality (85 = excellent for CV tasks)
  mask_format: "png"                # PNG for masks (lossless required)
  mask_compression: 9               # PNG compression level (max)

  # Storage guard — abort if free disk space drops below this threshold
  storage_guard_gb: 15.0

# ── Dataset Splitting ─────────────────────────────────────────
splitting:
  # DeepGlobe provides official splits. Do NOT run splitting.py.
  skip: true
  train_ratio: 0.70                 # reference only — not applied
  val_ratio: 0.15
  test_ratio: 0.15

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  enabled: true
  preview_count: 8
  pipeline:
    horizontal_flip:
      p: 0.5
    vertical_flip:
      p: 0.5
    random_rotate_90:
      p: 0.5
    shift_scale_rotate:
      shift_limit: 0.0625
      scale_limit: 0.2
      rotate_limit: 45
      p: 0.5
    random_brightness_contrast:
      brightness_limit: 0.3
      contrast_limit: 0.3
      p: 0.5
    gauss_noise:
      var_limit: [10, 50]
      p: 0.3
    blur:
      blur_limit: 3
      p: 0.3
    clahe:
      clip_limit: 4.0
      p: 0.3

# ── Occlusion Simulation ──────────────────────────────────────
occlusion:
  enabled: true
  # Save only 20 representative samples. All others generated on-the-fly during training.
  samples_to_generate: 20
  types:
    tree_canopy:
      enabled: true
      light:
        coverage_min: 0.10
        coverage_max: 0.25
      medium:
        coverage_min: 0.25
        coverage_max: 0.50
      heavy:
        coverage_min: 0.50
        coverage_max: 0.75
      noise_scale: 0.05
      blob_size_range: [30, 120]
      color_variation: 20

    building_shadow:
      enabled: true
      light:
        coverage_min: 0.05
        coverage_max: 0.20
      medium:
        coverage_min: 0.20
        coverage_max: 0.40
      heavy:
        coverage_min: 0.40
        coverage_max: 0.65
      sun_angle_range: [30, 150]
      shadow_length_range: [0.5, 2.0]
      darkening_factor: 0.35

    vehicle:
      enabled: true
      light:
        count_range: [1, 3]
      medium:
        count_range: [3, 8]
      heavy:
        count_range: [8, 20]
      size_range_w: [8, 25]
      size_range_h: [15, 45]

    cloud_cover:
      enabled: true
      light:
        coverage_min: 0.05
        coverage_max: 0.20
        opacity_range: [0.2, 0.5]
      medium:
        coverage_min: 0.20
        coverage_max: 0.45
        opacity_range: [0.5, 0.75]
      heavy:
        coverage_min: 0.45
        coverage_max: 0.70
        opacity_range: [0.75, 0.95]
      blur_sigma_range: [20, 60]

# ── Quality Analysis ──────────────────────────────────────────
quality:
  road_width_estimation:
    enabled: true
    method: "distance_transform"
  compute_road_density: true
  compute_class_imbalance: true
  generate_charts: true

# ── Visualization ─────────────────────────────────────────────
visualization:
  dpi: 150
  figure_style: "dark_background"
  colormap_roads: "plasma"
  colormap_masks: "Greens"
  save_format: "png"
  show_grid: false
  max_visualizations: 10

# ── Geospatial Metadata ───────────────────────────────────────
geospatial:
  default_crs: "EPSG:4326"
  store_crs: true
  store_bounds: true
  store_transform: true
  store_resolution: true
  metadata_format: "json"

# ── Logging ───────────────────────────────────────────────────
logging:
  level: "INFO"
  log_to_file: true
  log_dir: "logs"
  max_bytes: 10485760
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
